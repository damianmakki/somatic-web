name: Deploy to main site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout somatic repo
        uses: actions/checkout@v4.2.2

      - name: Push to main repo
        env:
          SSH_KEY: ${{ secrets.MAIN_REPO_DEPLOY_KEY }}
        run: |
          set -e

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          # Verify connectivity before cloning
          ssh -T git@github.com 2>&1 | grep -q "successfully authenticated" || true

          # Clone main repo into /tmp to keep it fully separate from workspace
          git clone git@github.com:RuckusLabs/ruckuslabs.co.git /tmp/main-repo

          # Sync somatic files into /somatic subfolder
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ /tmp/main-repo/somatic/

          # Commit and push
          cd /tmp/main-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add somatic/
          git diff --staged --quiet || git commit -m "Deploy somatic → ruckuslabs.co/somatic"
          git push