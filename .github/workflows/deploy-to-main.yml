name: Deploy to main site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout somatic repo
        uses: actions/checkout@v4

      - name: Push to main repo
        env:
          SSH_KEY: ${{ secrets.MAIN_REPO_DEPLOY_KEY }}
        run: |
          # Set up SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          # Clone main repo
          git clone git@github.com:RuckusLabs/ruckuslabs.co.git main-repo

          # Sync somatic files into /somatic subfolder
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ main-repo/somatic/

          # Commit and push
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add somatic/
          git diff --staged --quiet || git commit -m "Deploy somatic → ruckuslabs.co/somatic"
          git push