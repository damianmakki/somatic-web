title: Somatic
baseurl: "/somatic"

plugins:
  - jekyll-paginate

paginate: 6
paginate_path: "/blog/page:num/"

excerpt_separator: "<!--more-->"

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      og: true
      og_type: "article"
      extra_css: /src/css/blog.css
      permalink: /blog/:slug/
